name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run rule-logic tests (no external API calls)
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_thyroid_decision.py tests/test_thyroid_safety.py -v

      - name: Smoke test — app boots & exposes routes
        env:
          PYTHONPATH: .
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from app.main import app

          client = TestClient(app)
          assert client.get("/health").status_code == 200, "/health not OK"

          paths = client.get("/openapi.json").json()["paths"]
          for required in ("/api/v1/patient/thyroid-chat", "/api/v1/doctor/thyroid-consult", "/api/auth/login"):
              assert required in paths, f"missing route: {required}"
          print("OK — health +", len(paths), "API paths exposed")
          PY
