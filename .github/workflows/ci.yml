name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run rule-logic tests (no external API calls)
        env:
          PYTHONPATH: .
        run: |
          pytest tests/test_thyroid_decision.py tests/test_thyroid_safety.py -v

      - name: Smoke test — app imports & exposes routes
        env:
          PYTHONPATH: .
        run: |
          python -c "import app.main; paths=[r.path for r in app.main.app.routes if hasattr(r,'path')]; assert '/health' in paths; assert '/api/v1/patient/thyroid-chat' in paths; print('OK', len(paths), 'routes')"
